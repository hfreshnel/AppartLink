services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: appartlink
            POSTGRES_PASSWORD: appartlink
            POSTGRES_DB: appartlink
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U appartlink"]
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 10

    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        restart: unless-stopped
        ports:
            - "4000:4000"
        env_file:
            - apps/api/.env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 15s

    workers:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        command: ["tsx", "apps/api/src/workers/index.ts"]
        restart: unless-stopped
        env_file:
            - apps/api/.env
        depends_on:
            api:
                condition: service_healthy
            redis:
                condition: service_healthy

    web:
        build:
            context: .
            dockerfile: apps/web/Dockerfile
            args:
                NEXT_PUBLIC_API_URL: http://localhost:4000
                NEXT_PUBLIC_APP_URL: http://localhost:3000
        restart: unless-stopped
        ports:
            - "3000:3000"
        depends_on:
            api:
                condition: service_healthy

volumes:
    postgres_data:
    redis_data:
